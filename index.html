<!doctype html>
<html dir="rtl" lang="ar">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Abo Osam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Cairo", sans-serif;
      }
    </style>
  </head>
  <body
    class="bg-gradient-to-br from-gray-900 via-gray-800 to-gray-900 min-h-screen text-white"
  >
    <div class="max-w-5xl mx-auto py-10 px-4">
      <!-- Card -->
      <div
        class="bg-gray-800/70 backdrop-blur-xl rounded-3xl shadow-2xl overflow-hidden"
      >
        <!-- Cover -->
        <div class="h-48 relative"></div>

        <!-- Profile Section -->
        <div class="px-8 pb-8">
          <!-- Avatar + Name -->
          <div
            class="flex flex-col md:flex-row md:items-end md:justify-between -mt-16"
          >
            <div class="flex items-center gap-6">
              <img
                src="vector.jpg"
                class="w-32 h-32 z-50 rounded-full border-4 border-gray-800 shadow-lg"
              />
              <div>
                <h1 class="text-3xl font-bold">ابو عصام يكسب</h1>
                <p class="text-gray-400">عالم الموبايل</p>
                <div class="flex gap-2 mt-2">
                  
              </div>
            </div>

            <div class="mt-4 md:mt-0 flex gap-3">
              
            </div>
          </div>

          <!-- Bio -->
          <p class="mt-6 text-gray-300 max-w-2xl">
          
          </p>

          <!-- Stats -->
          <div class="grid grid-cols-3 gap-6 mt-8 text-center">
            <div class="bg-gray-700/40 rounded-xl py-4">
              <p class="text-2xl font-bold">120</p>
              <p class="text-gray-400 text-sm">Projects</p>
            </div>
            
          </div>

          <!-- Links -->
          <div class="mt-8 grid md:grid-cols-3 gap-4">
            <a
              href="#"
              class="bg-indigo-500 hover:bg-indigo-600 text-center py-3 rounded-xl font-medium transition"
              >Portfolio</a
            >
            <a
              href="#"
              class="bg-gray-900 hover:bg-black text-center py-3 rounded-xl font-medium transition"
              >GitHub</a
            >
            <a
              href="#"
              class="bg-pink-500 hover:bg-pink-600 text-center py-3 rounded-xl font-medium transition"
              >Instagram</a
            >
          </div>

          <!-- Projects Preview -->
          <div class="mt-10">
            <h2 class="text-xl font-semibold mb-4">Featured Projects</h2>
            <div class="grid md:grid-cols-3 gap-6">
              <div
                class="bg-gray-700/40 rounded-xl p-4 hover:scale-105 transition"
              >
                <h3 class="font-semibold">E-commerce System</h3>
                <p class="text-sm text-gray-400 mt-2">
                  React + Node.js full stack platform
                </p>
              </div>
              <div
                class="bg-gray-700/40 rounded-xl p-4 hover:scale-105 transition"
              >
                <h3 class="font-semibold">Shipping App</h3>
                <p class="text-sm text-gray-400 mt-2">
                  Logistics management solution
                </p>
              </div>
              <div
                class="bg-gray-700/40 rounded-xl p-4 hover:scale-105 transition"
              >
                <h3 class="font-semibold">Social Magic</h3>
                <p class="text-sm text-gray-400 mt-2">
                  Social engagement service
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
